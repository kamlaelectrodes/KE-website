name: Build facility WebP assets

on:
  workflow_dispatch:
  push:
    branches:
      - fix/credibility-darkmode-rd-v8
    paths:
      - 'image-build/**'
      - '.github/workflows/build-facility-images.yml'

permissions:
  contents: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/credibility-darkmode-rd-v8
          fetch-depth: 0

      - name: Decode compressed WebP assets
        shell: bash
        run: |
          set -euo pipefail
          cat image-build/plant.*.b64 | tr -d '\n\r ' | base64 --decode > plant-partapur.webp
          cat image-build/office.*.b64 | tr -d '\n\r ' | base64 --decode > head-office-chhipi-tank.webp
          echo '994f9fcc0aa42faa9c49d545346791dfce91b84f57d5af7d3c3f8a7539efc01a  plant-partapur.webp' | sha256sum --check
          echo '6b74a56a4c89088861ee08884629eea6758bebd0eb9bb4a08bc7f8bd85f3bdad  head-office-chhipi-tank.webp' | sha256sum --check
          file plant-partapur.webp head-office-chhipi-tank.webp
          ls -lh plant-partapur.webp head-office-chhipi-tank.webp

      - name: Commit generated assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'kamlaelectrodes-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add plant-partapur.webp head-office-chhipi-tank.webp
          if git diff --cached --quiet; then
            echo 'Facility image assets already current.'
          else
            git commit -m 'Add compressed WebP facility photographs'
            git push origin HEAD:fix/credibility-darkmode-rd-v8
          fi
